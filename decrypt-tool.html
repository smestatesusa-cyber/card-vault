<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Vault — View Details</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F7F4EF;
    --dark: #1A1A18;
    --gold: #B8975A;
    --gold-light: #D4B07A;
    --muted: #8A8680;
    --border: #E2DDD6;
    --success: #4A7C59;
    --error: #C0392B;
  }

  body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 80% 20%, rgba(184,151,90,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 10% 80%, rgba(184,151,90,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 2px;
    width: 100%;
    max-width: 480px;
    padding: 3rem 3rem 2.5rem;
    box-shadow: 0 4px 40px rgba(26,26,24,0.06);
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .lockbadge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.2rem;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.9rem;
    font-weight: 500;
    color: var(--dark);
    line-height: 1.2;
    margin-bottom: 0.6rem;
  }

  .subtitle {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.6;
    font-weight: 300;
  }

  .divider {
    width: 32px;
    height: 1px;
    background: var(--gold);
    margin: 1.5rem 0;
    opacity: 0.6;
  }

  .field { margin-bottom: 1.4rem; }

  label {
    display: block;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.45rem;
  }

  input, textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 1px;
    padding: 0.75rem 0.9rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    color: var(--dark);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
  }

  textarea {
    resize: vertical;
    min-height: 90px;
    font-size: 0.78rem;
    font-family: 'Courier New', monospace;
  }

  input:focus, textarea:focus {
    border-color: var(--gold);
    background: #fff;
  }

  input.error { border-color: var(--error); }
  input::placeholder, textarea::placeholder { color: #C4BFBA; }

  /* PIN input — 4 big boxes */
  .pin-row {
    display: flex;
    gap: 0.75rem;
    justify-content: flex-start;
  }

  .pin-box {
    width: 56px;
    height: 60px;
    border: 1px solid var(--border);
    border-radius: 1px;
    background: var(--cream);
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--dark);
    text-align: center;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
    caret-color: transparent;
  }

  .pin-box:focus {
    border-color: var(--gold);
    background: #fff;
  }

  .pin-box.error { border-color: var(--error); }

  .warning {
    background: rgba(184,151,90,0.06);
    border: 1px solid rgba(184,151,90,0.2);
    border-radius: 1px;
    padding: 0.85rem 1rem;
    font-size: 0.75rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 1.6rem;
    display: flex;
    gap: 0.6rem;
    align-items: flex-start;
  }

  .warning svg { flex-shrink: 0; margin-top: 1px; }

  button[type="submit"] {
    width: 100%;
    background: var(--dark);
    color: #fff;
    border: none;
    border-radius: 1px;
    padding: 0.95rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 0.4rem;
  }

  button[type="submit"]:hover { background: #2d2d2a; }

  .error-msg {
    margin-top: 1rem;
    background: rgba(192,57,43,0.06);
    border: 1px solid rgba(192,57,43,0.2);
    border-radius: 1px;
    padding: 0.7rem 1rem;
    font-size: 0.78rem;
    color: var(--error);
    display: none;
    text-align: center;
  }

  .error-msg.show { display: block; }

  .result {
    margin-top: 2rem;
    border: 1px solid var(--border);
    border-radius: 1px;
    overflow: hidden;
    display: none;
    animation: fadeUp 0.3s ease both;
  }

  .result.show { display: block; }

  .result-header {
    background: rgba(184,151,90,0.06);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.1rem;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .clear-btn {
    font-size: 0.65rem;
    color: var(--muted);
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.2s;
    padding: 0;
  }

  .clear-btn:hover { color: var(--error); }

  .result-body { padding: 0.5rem 0; }

  .row-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.65rem 1.1rem;
    border-bottom: 1px solid rgba(26,26,24,0.05);
  }

  .row-item:last-child { border-bottom: none; }

  .row-label {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    min-width: 120px;
  }

  .row-value {
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    color: var(--dark);
    text-align: right;
    word-break: break-all;
    flex: 1;
    padding: 0 0.5rem;
  }

  .copy-btn {
    cursor: pointer;
    color: var(--muted);
    background: none;
    border: none;
    padding: 2px 4px;
    border-radius: 2px;
    transition: color 0.2s, background 0.2s;
    flex-shrink: 0;
  }

  .copy-btn:hover { color: var(--gold); background: rgba(184,151,90,0.08); }
  .copy-btn.copied { color: var(--success); }

  @media (max-width: 520px) {
    .card { padding: 2rem 1.5rem; }
    h1 { font-size: 1.6rem; }
    .pin-box { width: 48px; height: 54px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="lockbadge">
    <svg width="11" height="13" viewBox="0 0 11 13" fill="none">
      <rect x="1" y="5" width="9" height="7.5" rx="1" stroke="currentColor" stroke-width="1.3"/>
      <path d="M3 5V3.5a2.5 2.5 0 015 0V5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    Advisor Access Only
  </div>

  <h1>View Card Details</h1>
  <p class="subtitle">Enter your 4-digit PIN and paste the encrypted data from the client's Google Sheet.</p>

  <div class="divider"></div>

  <div class="warning">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <circle cx="7" cy="7" r="6" stroke="#B8975A" stroke-width="1.2"/>
      <path d="M7 6v4M7 4.5v.5" stroke="#B8975A" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    Keep this page private. Clear results when done and never leave this page open on a shared device.
  </div>

  <div class="field">
    <label>Your PIN</label>
    <div class="pin-row">
      <input class="pin-box" id="pin0" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input class="pin-box" id="pin1" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input class="pin-box" id="pin2" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input class="pin-box" id="pin3" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]">
    </div>
  </div>

  <div class="field">
    <label for="encrypted">Encrypted Data</label>
    <textarea id="encrypted" placeholder="Paste encrypted string from Google Sheet..."></textarea>
  </div>

  <div id="error-msg" class="error-msg"></div>

  <button type="submit" onclick="decrypt()">Decrypt Card Details</button>

  <div class="result" id="result">
    <div class="result-header">
      Card Details
      <button class="clear-btn" onclick="clearResult()">Clear & close</button>
    </div>
    <div class="result-body" id="result-body"></div>
  </div>
</div>

<script>
// Read URL params — encrypted data pre-filled when opened from sheet menu
const params = new URLSearchParams(window.location.search);
if (params.get('data')) document.getElementById('encrypted').value = decodeURIComponent(params.get('data'));
// clientToken is passed via URL so we can combine PIN+token for decryption
const clientToken = params.get('token') ? decodeURIComponent(params.get('token')) : '';

// ─── PIN box auto-advance ──────────────────────────────────────────────────────
document.querySelectorAll('.pin-box').forEach((box, i, boxes) => {
  box.addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '').slice(-1);
    if (this.value && i < boxes.length - 1) boxes[i + 1].focus();
  });
  box.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && !this.value && i > 0) boxes[i - 1].focus();
    if (e.key === 'Enter') decrypt();
  });
  box.addEventListener('paste', function(e) {
    e.preventDefault();
    const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 4);
    [...pasted].forEach((ch, j) => { if (boxes[j]) boxes[j].value = ch; });
    if (boxes[pasted.length - 1]) boxes[Math.min(pasted.length, 3)].focus();
  });
});

// ─── Decryption ────────────────────────────────────────────────────────────────
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 310000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

async function decryptData(b64, password) {
  const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const salt  = bytes.slice(0, 16);
  const iv    = bytes.slice(16, 28);
  const ct    = bytes.slice(28);
  const key   = await deriveKey(password, salt);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
  return new TextDecoder().decode(plain);
}

async function decrypt() {
  const pin = ['pin0','pin1','pin2','pin3'].map(id => document.getElementById(id).value).join('');
  const encrypted = document.getElementById('encrypted').value.trim();
  const errEl     = document.getElementById('error-msg');
  const resultEl  = document.getElementById('result');

  errEl.classList.remove('show');
  resultEl.classList.remove('show');
  document.querySelectorAll('.pin-box').forEach(b => b.classList.remove('error'));

  if (pin.length < 4) {
    errEl.textContent = 'Please enter your 4-digit PIN.';
    errEl.classList.add('show');
    document.querySelectorAll('.pin-box').forEach(b => b.classList.add('error'));
    return;
  }

  if (!encrypted) {
    errEl.textContent = 'Please paste the encrypted data from the Google Sheet.';
    errEl.classList.add('show');
    return;
  }

  // Password = PIN + clientToken (same combination used during encryption)
  const password = pin + clientToken;

  try {
    const json = await decryptData(encrypted, password);
    const data = JSON.parse(json);

    const fields = [
      { label: 'Cardholder',   key: 'cardholder' },
      { label: 'Card Number',  key: 'cardnumber' },
      { label: 'Expiry',       key: 'expiry' },
      { label: 'CVV',          key: 'cvv' },
      { label: 'Billing Addr', key: 'billing' },
      { label: 'SSN',          key: 'ssn' },
      { label: 'Submitted',    key: 'submitted' },
    ];

    const body = document.getElementById('result-body');
    body.innerHTML = fields.map(f => `
      <div class="row-item">
        <span class="row-label">${f.label}</span>
        <span class="row-value" id="val-${f.key}">${data[f.key] || '—'}</span>
        <button class="copy-btn" id="copy-${f.key}" onclick="copyVal('${f.key}')" title="Copy">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <rect x="3.5" y="0.5" width="9" height="9" rx="1" stroke="currentColor" stroke-width="1.1"/>
            <path d="M1 4v7.5a1 1 0 001 1h7" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    `).join('');

    resultEl.classList.add('show');

  } catch(e) {
    errEl.textContent = 'Incorrect PIN or data. Please check and try again.';
    errEl.classList.add('show');
    document.querySelectorAll('.pin-box').forEach(b => b.classList.add('error'));
    document.getElementById('pin0').focus();
  }
}

function copyVal(key) {
  const val = document.getElementById('val-' + key)?.textContent;
  if (!val || val === '—') return;
  navigator.clipboard.writeText(val);
  const btn = document.getElementById('copy-' + key);
  btn.classList.add('copied');
  setTimeout(() => btn.classList.remove('copied'), 1500);
}

function clearResult() {
  document.getElementById('result').classList.remove('show');
  document.getElementById('encrypted').value = '';
  document.getElementById('error-msg').classList.remove('show');
  document.querySelectorAll('.pin-box').forEach(b => { b.value = ''; b.classList.remove('error'); });
  document.getElementById('pin0').focus();
}
</script>
</body>
</html>
